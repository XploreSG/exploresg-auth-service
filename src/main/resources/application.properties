# Application name
spring.application.name=exploresg-auth-service

# Google OAuth2 credentials (use environment variables or application-{profile}.properties)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id-here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret-here}
spring.security.oauth2.client.registration.google.scope=profile,email

# Optional: Customize redirect URI if needed
# spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Optional: Set default success URL after login
# spring.security.oauth2.client.client-name=Google

# JWT Configuration
# JWT Secret Key (use environment variable for security)
jwt.secret=${JWT_SECRET:default-development-secret-key-change-in-production}
# JWT Access Token Expiration (24 hours = 86400000 milliseconds)
jwt.expiration=86400000
# JWT Refresh Token Expiration (7 days = 604800000 milliseconds)  
jwt.refresh-expiration=604800000

# Frontend URL for redirects after OAuth2 success
app.frontend.url=http://localhost:3000

# Server Configuration
server.port=8080
server.servlet.context-path=/

# =============================================================================
# ACTIVE PROFILE CONFIGURATION
# =============================================================================
# Set active profile: dev, prod, or test
spring.profiles.active=dev

# =============================================================================
# SHARED CONFIGURATION (All Profiles)
# =============================================================================