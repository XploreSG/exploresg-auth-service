# =============================================================================
# PRODUCTION PROFILE - PostgreSQL Database
# =============================================================================

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/exploresg_auth
spring.datasource.username=${DB_USERNAME:exploresg_user}
spring.datasource.password=${DB_PASSWORD:exploresg_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=false

# JPA Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Disable H2 Console in production
spring.h2.console.enabled=false

# Production Logging
logging.level.com.exploresg.authservice=INFO
logging.level.root=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n